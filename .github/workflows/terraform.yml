name: Terraform CI/CD

on:
  workflow_call:
    inputs:
      service_name:
        description: 'Service / Cloud Run name (used when building the Docker image before apply)'
        required: true
        type: string
      repo_name:
        description: 'Artifact Registry repository name'
        required: true
        type: string
      region:
        description: 'GCP region'
        required: false
        type: string
        default: 'us-central1'
      terraform_version:
        description: 'Terraform version to use'
        required: false
        type: string
        default: '1.6.0'
      checkov_skip_checks:
        description: 'Comma-separated Checkov check IDs to skip'
        required: false
        type: string
        default: 'CKV_GCP_84'
      action:
        description: 'Explicit action override: plan | apply | destroy'
        required: false
        type: string
        default: ''
    secrets:
      GCP_CREDENTIALS:
        description: 'WIF provider resource name (projects/PROJECT_NUMBER/locations/global/workloadIdentityPools/POOL/providers/PROVIDER)'
        required: true
      GCP_SERVICE_ACCOUNT:
        description: 'Service account email for WIF (e.g. terraform-automation@project.iam.gserviceaccount.com)'
        required: true
      GCP_PROJECT_ID:
        description: 'GCP project ID'
        required: true
      TF_VAR_billing_account_id:
        description: 'GCP billing account ID'
        required: false
      TF_VAR_org_id:
        description: 'GCP organization ID'
        required: false

jobs:
  # ===========================================
  # Security Scanning - Runs on all branches
  # ===========================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check terraform directory exists
        run: |
          if [ ! -d "../terraform" ]; then
            echo "ERROR: terraform/ directory not found — cannot run security scan."
            exit 1
          fi
          echo "OK: terraform/ directory found"

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform
          soft_fail: false

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform
          framework: terraform
          soft_fail: false
          output_format: sarif
          download_external_modules: true
          skip_check: ${{ inputs.checkov_skip_checks }}

  # ===========================================
  # Terraform Validation - Runs on all branches
  # ===========================================
  terraform-check:
    name: Terraform Validate
    runs-on: ubuntu-latest
    needs: security-scan
    defaults:
      run:
        working-directory: terraform

    outputs:
      fmt-outcome: ${{ steps.fmt.outcome }}
      init-outcome: ${{ steps.init.outcome }}
      validate-outcome: ${{ steps.validate.outcome }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_CREDENTIALS }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive -diff
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Format Check Failed
        if: steps.fmt.outcome == 'failure'
        run: |
          echo "::error::Terraform files are not properly formatted. Run 'terraform fmt -recursive' locally and commit the changes."
          exit 1

  # ===========================================
  # Plan on PR - Shows changes before merge
  # ===========================================
  terraform-plan-pr:
    name: Terraform Plan (PR)
    runs-on: ubuntu-latest
    needs: terraform-check
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}
          terraform_wrapper: true

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_CREDENTIALS }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_region: ${{ inputs.region }}
          TF_VAR_billing_account_id: ${{ secrets.TF_VAR_billing_account_id }}
          TF_VAR_org_id: ${{ secrets.TF_VAR_org_id }}
        continue-on-error: true

      - name: Update PR with Plan
        uses: actions/github-script@v7
        env:
          PLAN: "${{ steps.plan.outputs.stdout }}"
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `### Terraform Validation Results

            | Check | Status |
            |-------|--------|
            | Security Scan | Passed |
            | Format | \`${{ needs.terraform-check.outputs.fmt-outcome }}\` |
            | Init | \`${{ needs.terraform-check.outputs.init-outcome }}\` |
            | Validate | \`${{ needs.terraform-check.outputs.validate-outcome }}\` |
            | Plan | \`${{ steps.plan.outcome }}\` |

            <details><summary>Show Plan Output</summary>

            \`\`\`terraform
            ${process.env.PLAN}
            \`\`\`

            </details>

            *Pushed by: @${{ github.actor }}*

            ---
            **Merge Checklist:**
            - [ ] Security scan passed
            - [ ] Terraform format is correct
            - [ ] Plan has been reviewed
            - [ ] No destructive changes without approval`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Terraform Validation Results')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: output
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: output
              });
            }

      - name: Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1

  # ===========================================
  # Plan - Runs on push to main or manual trigger
  # ===========================================
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: terraform-check
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch') ||
      (inputs.action == 'plan' || inputs.action == 'apply')
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_CREDENTIALS }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_region: ${{ inputs.region }}
          TF_VAR_billing_account_id: ${{ secrets.TF_VAR_billing_account_id }}
          TF_VAR_org_id: ${{ secrets.TF_VAR_org_id }}
        continue-on-error: true

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/tfplan
          retention-days: 5

      - name: Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1

  # ===========================================
  # Build Docker Image - Manual apply only
  # ===========================================
  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: inputs.action == 'apply'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Dockerfile exists
        run: |
          if [ ! -f "Dockerfile" ]; then
            echo "ERROR: Dockerfile not found"
            exit 1
          fi
          echo "OK: Dockerfile found"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_CREDENTIALS }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ inputs.region }}-docker.pkg.dev --quiet

      - name: Ensure Artifact Registry repository exists
        run: |
          gcloud artifacts repositories describe ${{ inputs.repo_name }} \
            --location=${{ inputs.region }} \
            --project=${{ secrets.GCP_PROJECT_ID }} 2>/dev/null || \
          gcloud artifacts repositories create ${{ inputs.repo_name }} \
            --repository-format=docker \
            --location=${{ inputs.region }} \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --description="Docker repository for ${{ inputs.service_name }}"

      - name: Build and Push Docker Image
        run: |
          IMAGE="${{ inputs.region }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ inputs.repo_name }}/${{ inputs.service_name }}:latest"
          docker build -t $IMAGE .
          docker push $IMAGE

  # ===========================================
  # Apply - Manual trigger only
  # ===========================================
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: docker-build
    if: inputs.action == 'apply'
    environment: production
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_CREDENTIALS }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: terraform

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve -refresh=true
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_region: ${{ inputs.region }}
          TF_VAR_billing_account_id: ${{ secrets.TF_VAR_billing_account_id }}
          TF_VAR_org_id: ${{ secrets.TF_VAR_org_id }}

  # ===========================================
  # Stop - Full project shutdown, manual only
  # Destroys ALL billable GCP resources.
  # ===========================================
  terraform-destroy:
    name: Stop Project (Full Shutdown)
    runs-on: ubuntu-latest
    needs: terraform-check
    if: inputs.action == 'destroy'
    environment: production
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_CREDENTIALS }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      # -- Stop all Cloud Run services first (immediate billing stop) --------
      - name: Stop Cloud Run services
        run: |
          echo "Fetching all Cloud Run services in ${{ inputs.region }}..."
          SERVICES=$(gcloud run services list \
            --region=${{ inputs.region }} \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --format='value(metadata.name)' 2>/dev/null || true)
          if [ -z "$SERVICES" ]; then
            echo "No Cloud Run services found."
          else
            for SVC in $SERVICES; do
              echo "Deleting Cloud Run service: $SVC"
              gcloud run services delete "$SVC" \
                --region=${{ inputs.region }} \
                --project=${{ secrets.GCP_PROJECT_ID }} \
                --quiet || true
            done
          fi

      # -- Terraform destroy (removes all state-tracked resources) -----------
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_region: ${{ inputs.region }}
          TF_VAR_billing_account_id: ${{ secrets.TF_VAR_billing_account_id }}
          TF_VAR_org_id: ${{ secrets.TF_VAR_org_id }}

      # -- Catch-all: remove any orphaned resources not in Terraform state ----
      - name: Delete Artifact Registry repositories
        if: always()
        run: |
          REPOS=$(gcloud artifacts repositories list \
            --location=${{ inputs.region }} \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --format='value(name)' 2>/dev/null || true)
          if [ -z "$REPOS" ]; then
            echo "No Artifact Registry repositories found."
          else
            for REPO in $REPOS; do
              echo "Deleting repository: $REPO"
              gcloud artifacts repositories delete "$REPO" \
                --location=${{ inputs.region }} \
                --project=${{ secrets.GCP_PROJECT_ID }} \
                --quiet || true
            done
          fi

      - name: Delete Secret Manager secrets
        if: always()
        run: |
          SECRETS=$(gcloud secrets list \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --format='value(name)' 2>/dev/null || true)
          if [ -z "$SECRETS" ]; then
            echo "No Secret Manager secrets found."
          else
            for SECRET in $SECRETS; do
              echo "Deleting secret: $SECRET"
              gcloud secrets delete "$SECRET" \
                --project=${{ secrets.GCP_PROJECT_ID }} \
                --quiet || true
            done
          fi

      - name: Delete Cloud SQL instances
        if: always()
        run: |
          INSTANCES=$(gcloud sql instances list \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --format='value(name)' 2>/dev/null || true)
          if [ -z "$INSTANCES" ]; then
            echo "No Cloud SQL instances found."
          else
            for INSTANCE in $INSTANCES; do
              echo "Deleting SQL instance: $INSTANCE"
              gcloud sql instances delete "$INSTANCE" \
                --project=${{ secrets.GCP_PROJECT_ID }} \
                --quiet || true
            done
          fi

      - name: Confirm shutdown
        if: always()
        run: |
          echo "======================================================"
          echo " Project shutdown complete."
          echo " All billable resources have been removed."
          echo " Project: ${{ secrets.GCP_PROJECT_ID }}"
          echo " Region:  ${{ inputs.region }}"
          echo "======================================================"
