name: Docker Build and Deploy to Cloud Run

on:
  workflow_call:
    inputs:
      service_name:
        description: 'Cloud Run service name'
        required: true
        type: string
      repo_name:
        description: 'Artifact Registry repository name'
        required: true
        type: string
      region:
        description: 'GCP region'
        required: false
        type: string
        default: 'us-central1'
    secrets:
      GCP_SA_KEY:
        description: 'GCP service account key JSON'
        required: true
      GCP_PROJECT_ID:
        description: 'GCP project ID'
        required: true

jobs:
  # ===========================================
  # Validate - Ensure required files exist
  # ===========================================
  validate:
    name: Validate Required Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          MISSING=0

          if [ ! -f "Dockerfile" ]; then
            echo "ERROR: Dockerfile not found"
            MISSING=1
          else
            echo "OK: Dockerfile found"
          fi

          if [ ! -d "terraform" ]; then
            echo "ERROR: terraform/ directory not found"
            MISSING=1
          else
            echo "OK: terraform/ directory found"
          fi

          if [ $MISSING -ne 0 ]; then
            echo "One or more required files are missing. Aborting deployment."
            exit 1
          fi

          echo "All required files present. Proceeding with deployment."

  # ===========================================
  # Build and Push Docker image
  # ===========================================
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: validate

    permissions:
      contents: read
      id-token: write

    outputs:
      image: ${{ steps.image.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ inputs.region }}-docker.pkg.dev --quiet

      - name: Set image name
        id: image
        run: |
          IMAGE="${{ inputs.region }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ inputs.repo_name }}/${{ inputs.service_name }}"
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ steps.image.outputs.image }}:${{ github.sha }} \
            -t ${{ steps.image.outputs.image }}:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ steps.image.outputs.image }}:${{ github.sha }}
          docker push ${{ steps.image.outputs.image }}:latest

  # ===========================================
  # Deploy to Cloud Run
  # ===========================================
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: build-and-push

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy to Cloud Run
        run: |
          IMAGE="${{ inputs.region }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ inputs.repo_name }}/${{ inputs.service_name }}"
          gcloud run deploy ${{ inputs.service_name }} \
            --image $IMAGE:${{ github.sha }} \
            --region ${{ inputs.region }} \
            --platform managed

      - name: Show Service URL
        run: |
          URL=$(gcloud run services describe ${{ inputs.service_name }} \
            --region ${{ inputs.region }} \
            --format='value(status.url)')
          echo "Deployed to: $URL"
